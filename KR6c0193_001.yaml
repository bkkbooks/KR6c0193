body:
  text: 松溪道人無垢子注這點靈光道上來只因逐妄墮塵埃君今要見還鄉路悟得心經道眼開摩訶西天梵語也東土翻為大且大者廣無邊際之謂也廣大無邊者莫過虗空大道也川老云虗空境界莫思量大道清幽理更長又云十方無壁落八面亦無門大道無邊際虗空難度量道云迎之不見其首隨之不見其後儒云仰之彌高鑽之彌堅瞻之在前忽錯在後諸賢聖皆如此稱揚廣大也日月雖明難比其光乾坤雖大難包其體能生萬有而不見其形遍周沙界而不覩其跡雖是如此廣大玄妙誰知更有一物過於此者且道是何物還識這箇麼寬則包藏法界窄則不立纖毫顯則八荒九夷無所不至隱則纖芥微塵無所不入今者不避罪𠍴分明漏泄乃人之本源也仙師有云為甚此心開大道只因元向道中來世人不能返本者蓋因錯認色身為己被六根所瞞七情遮蔽自失本真以致流浪生死也要見本真麼尋不見覔不見十二時中繞身轉省得麼法身體若太虗空性道元來總一同只因逐妄迷真性所以輪回六道中般若西天梵語也東土翻為智慧且智慧者正知正解審察之謂也修行之人須用智慧之力降伏身心不令放肆以習靜定道云能以智慧之力攝伏諸魔精蓮經云慧日破諸暗能伏災風火儒云智能破邪慧能破暗且無智愚人作事粗惡不肯三思惟務廣學多聞念在誇談講論不究自家生死好覔他人是非不親真實道人愛近虗頭禪客空談聖人經典心地全不用功圖名貪利我慢貢高只說眼下時光不想腦後之事如此之人乃聰明外道也古德有云外道聰明無智慧仙師云口說心不行非是精細漢儒云先治身心後治家國且有智慧之人作事安詳不肯造次識因果顧罪福親近知識參問至人窮性命之根元究生死之大事制伏身心收斂神氣念念在道息息歸真一日功成行滿㘞地一聲透出三界此虗空混為一體若到此地造化不能移易陰陽不能陶鑄四時不能遷五行不能役鬼神不能拘劫火不能壞作箇逍遙自在物外間人要見物外間人麼六座門頭常出入雖然相近不相親開著眼休得蹉過省得麼智慧聰明路兩差聰明枝葉慧根芽若改愚癡生智慧多年枯木自開華波羅西天梵語也東土翻為彼岸此岸者生死之際也彼岸者出生死之岸也迷者此岸悟者彼岸世人若迷本性即愚癡顛倒認四大六根為己爭名競利謀千年之活計積萬劫之冤𠍴背覺合塵迷真逐妄忙忙而不知休息念念而心境不除忽朝大限到來臨行手無所措這裡脫下濕布衫那裡穿上虱虱襖去去來來改頭換面似蟻循環何日是了生死苦海幾時得渡如是之者只在此岸若有人猛然自悟從前所為所作盡是虗假棄假循真窮根究本常近至人常親知識求過岸之舟覔方便之篙渡過愛河苦海而登彼岸得脫生死洪波更不拖泥帶水作箇腳乾手燥清淨自在間人也且道如何得達彼岸咦他人難用力自渡自家身會麼智慧為船精進篙靈臺用力出波濤翻身直上菩提岸撒手歸來明月高蜜多西天梵語也東土翻為無極又蜜者和也多者衆聚也且無極者至高至大難極之謂也釋云無極道云太極儒曰皇極皆謂此也今分明說開蜜之一字亦比於大道虗空多者謂萬彚也譬道能包含萬類有情無情盡在大道之中人之真性一同亦能包藏萬法萬法盡在一性之中太虗之內有八萬四千異類種性說不可盡皆在人之一性之內一性譬如蜜種性喻於多情行人以一性均和種性合而為一故曰蜜多道云識得一萬事畢釋云萬法歸一儒云吾道一以貫之且道如何是一還識這個麼咄五行不到處父母未生前雖然說破不行難到直須去盡塵垢方見省麼一性為蜜衆為多先將覺性普均和坐成一片真如性一性圓明赴大羅心心者人之本源也一切萬法盡在一心之內有八萬四千等動則無窮無盡定則不變不移釋云心生種種法生心滅種種法滅道云心死則性月朗明心生則欲塵遮蔽儒云制之一心則止謀於多事則亂是以古聖教學人收攝其心歸於一處喚作萬法歸一又名一字法門因人不信是心是佛是心作佛所以多種方便指示世人見自本性豈不見古云三點如星象橫鈎似月斜披毛從此得作佛也由他是也上天入地皆在自心所為非他處所得經云在於間處收攝其心又云制之一處事無不辦不能歸一者因識心者少亂性者多故失真道矣為何不識其心因其多惑其性皆緣失神昏昧逐境迷心六根內盲著物亂性不生智慧愚暗之故也若肯修心窮性命究生死親近明師參求法藥療治心病念茲在茲步步行行坐臥不忘語默動靜不離這箇忽然眉毛竪起眼睛露出便見本來面目且道本來面目如何形狀川老有云火不能燒水不能溺風不能飄刀不能劈軟似兜羅硬如鐵壁天上人間古今不識咄知道麼終朝常對面不識是何人這輪心鏡本無塵因塵難照本來真塵盡鏡明無一物自然現出法王身經經者徑也是世人修行之路徑也學人得此不疑擬休要誤了工程驀直便行須有到家時節只怕路頭不真差行錯認且道向甚處去是豫今明說向寸草不生處纖塵不立處無泥水無坑坎淨裸裸赤灑灑平穩穩處去猛然逢著一顆圓陀陀光爍爍亘古不壞如意光明寶珠親手拈來得大利用不受困苦釋云摩尼寶珠道云黍米玄珠儒云九曲明珠要見此珠麼一心象外覔休向世間求這卷真經本在心自家藏寶不須尋猛然檢著無生品迸出明珠耀古今觀自在菩薩自在菩薩人人皆有只因六根諸境遮障不能觀看情欲萬緣所牽不得自在若有智慧之人信得及放得下但於幽靜間處打併身心坐令極靜靜中更靜無纖毫異念一心清淨守至靜極猛然一動有一真人在自己靈宮往往來來縱橫無礙這裡方見自己菩薩優滿自在一剎那間遍周沙界隨處現法身到處不留跡光明普照觀之不見諸人若要見此菩薩觀之不用其目聽之不用其耳去耳目之用才識自在菩薩道云視不見我聽不得聞離種種邊名為妙道金剛經云若以色見我以音聲求我是人行邪道不能見如來儒云視不用目聽不用耳離耳目之用自然得性如是之者方知一切處此真仙菩薩未嘗不在同坐同行同歡同笑寸步不曾相離只是自家昧了要見此菩薩麼咦雖然出入無踪跡爍爍光明見也麼菩薩從來不離身自家昧了不相親若能靜坐回光照便見生前舊主人行行者修行也路徑崎嶇不修難行且修是修心向道行是行善歸真如人修路相似去礙路荊棘除當道頑石高者斷之低者填之打掃潔淨便坦然平穩人之心地亦要如此下功去一切損人利己之心如去礙路荊棘相似礙登途穩步除一切雜念障道因緣如除當道頑石一同得進身平正損大過補不及令得均平屏垢心絶染污打併清淨此乃修行初入門之要也非在口說亦非足行全憑心地下功仙真云心地下功全拋世事釋云心地法門非在舌辨儒云說不如行行不如到此也又要看這一步從何而起若知起處便知生死根源昔日劉海月參白雲師父拜而問曰弟子念慮降伏不住如何師問云是誰念慮答弟子師云是誰降伏海月似省不省沉吟微笑師云來去都由你閙好沒主宰若是敵他不過即便放下更要知他放下的是誰若識得自有主宰便不被他瞞過海月遂省禮謝而已又石霜和尚問石頭和尚舉念不停時如何石頭咄云是誰舉念石霜於此大悟但只如此體究念念不離於當處舉意思慮語言知覺細細審觀從何而出古云欲知佛去處只這語言是道云要知本性根由不離言語動靜寶公云未了之人聽一言秪這如今誰動口然雖如是說開向上更有妙處不修不行不能自到若果到家鄉則罷問程矣且道家鄉遠近迷則千山萬水隔悟則回頭便是家理會得麼起初行處認教真若還失腳喪其身踏得故鄉田地穩做箇逍遙自在人深深者幽微玄妙徹骨徹髓處也若要到此田地須是打併輕快方可道云損之又損之以至於無為釋云放下又放下自然身心輕快儒云苟日新日日新又日新要如此者須去靜坐日夜打掃直至掃無可掃寸絲不掛如父母未生前燒了一般古云貼體汗衫都脫却反求諸己廓然無自然到家且道不得還家者何也呀日晚程途遠身困擔兒沉省也麼大道家鄉本不深世人擔重自難尋若能放下渾無物便見靈山佛祖心般若般若者西天梵語也東土翻為智慧大凡為人須要自生智慧若無智慧真是愚人空過一生甘伏死門有一等無智之人以聰明謂之智慧大錯矣且聰明之人賣弄精細役使心神出言如飛龍俊行持如跛鱉病龜貪利圖名以粗作細看世財如骨如髓棄性命若糞若土只知明日後日今年後年不知老之將至死限臨頭可惜空過時光虗勞一世似此所為生死輪回如何脫得有智之人外如愚魯內默安詳識有生有死悟無得而無失常自諦觀生從何來死從何往發此一念親近知識參問至人求出世之法逃生死之路避過惡如避錐刀顧性命如顧寶貝動則安人利物亦不被境瞞靜則入定觀空更不滯莾蕩如是之者一旦果完擺手還家得大自在先師云一日得還鄉不作飄蓬客釋云撒手到家人不識更無一物獻尊堂川老云孤舟到岸遠客還鄉且道如何是鄉咄遠後十萬八千近後不離當處會得麼智慧聰明總是心智人修內蠢傍尋若人有智超三界無智愚夫生死臨波羅波羅者西天梵語也東土翻為到彼岸且迷者有生死墮輪回只在此岸也悟者超生死脫輪回到彼岸也若要到彼岸須是自生智慧過此生死苦海如人過水水深難過須用船橋或用木牌竹筏多種方便盛載過此苦海而到彼岸既達彼岸前者船橋木牌等物盡皆無用見性悟道者亦復如是大顛云如盲人求醫遠路不能自行須假人牽兼手中有杖方可無此二物不能得到既到醫家醫師與他點眼大見光明其杖與牽人都無用處頓悟涅槃正道亦復如是且道甚是牽人柱杖豫今說破信者便行不得外行難成內功須用廣作福田福至心靈自然有箇道徑只此便是牽人也然後可以坐禪修道辨取內功求見性之法了生死大事一日功圓得見本來面目便是柱杖也更要參訪明眼師真大德高僧求其印證印證師真便是醫人也一日頓悟從前多種方便盡皆無用惟柱杖不可棄道云得魚忘筌得兔忘蹄釋云過河須用筏到岸不須船儒云得意忘言得米忘田且道都教忘却因甚只不教棄了柱杖未到水窮山盡處且存作伴過時光理會也未這根柱杖本無相元與虗空無兩樣若人提起透三天遍界邪魔不敢望蜜多蜜多者西天梵語也東土翻為無極且無極者無極而太極者乃虗空妙道也古云無極而太極太極分二儀二儀分三才三才生四象四象生五行因有五行漸漸滋生萬類萬類盡在妙道之中包含也是以蜜之一字喻於虗空妙道多者比於諸品衆類有情無情皆屬道之含攝且如蜂採百華醞造成蜜未成之時有醎酸甘苦辛之衆味青黃赤白之衆色其味不等其色不一一日功成蜜就種種之味釀成一味般般之色混同一色馨香美味一無差別到此則蜂得養生人得受用修行之人亦復如是且如修行之人調伏身心朝磨暮煉功行未成之際有慳貪心利名心嫉妬心計較心勝負心貢高心我慢心殺害心狼毒心三毒心怕怖心邪心妄心無明黑暗心種種不善之心又有暴惡性粗躁性風吹性隨邪性愚濁性見趣性乖劣性虗詐性好閧性撅強性顛狂性浮華性諂曲性自無始劫來一切習性八萬四千有餘說不可盡一日功圓頑心自盡煆成一味清淨最上無礙真心種種自和煉就一片萬劫不壞圓明法性到此並無差別之心亦無異類之性衆惡自消衆惡自滅一真獨露得大自在古德云衆星朗朗不如孤月獨明道云百川流不盡一海納無窮仙師云千思萬慮終成妄獨守一真道自親且道如何得見一真咄開眼被他瞞諸人拿不著省也未若干種種恐難同休教差別走西東收來安放丹爐內煉得金烏一樣紅時時者正見之時也言見亦無可見言時未可定時仙師云一陽才動之時自有無窮消息古德云清風颯颯透心懷此時快樂人難識玄之又玄無東西南北無四維上下無過去未來見在虗空平等與大道混然無有二處共歸一時川老云時時清風明月鎮相隨桃紅李白薔薇紫問著東君總不知且道東君在何處安身見麼打不離割不死在桃紅李白在薔薇黃紫呵呵模得著也未若問端的是何時清風明月自家知東君昨夜傳消息綻出紅梅第一枝照見五蘊皆空五蘊者色受想行識也此五等因積習而不散妄認色身是我故長劫輪回若人猛省借此幻身須教修行常自返照照見五蘊淨盡清淨本然且道如何是色受想行識怎生得此五蘊皆空豫今直說分明若有解悟之者休生疑惑信受奉行必有契道之日且色者窒礙之義若見境逢物不著不染是無窒礙色蘊自空也受者領納之義若遇一切聲色境界心不領納得受蘊空也想者妄想思慮之義若過去不思未來無想現在自如得想蘊空也行者心念不停遷流之義若十二時中心不外遊念不煩亂不被物轉不被境留一念不離當處得行想空也識者別無親疏之義亦乃著物之理若見一切境物一無分別辨認一槩平等見如不見識如不識無親無疏來則應之去則不思得識蘊空也既得到此田地自然照見五蘊皆空六窗明淨淨裸裸赤灑灑沒可把又有甚四大五蘊名字亦不可得道云惟見於空釋云虗空獨露昔歌利王遊獵遇一仙人問語不答先却左膊次卸右膞節節支解仙人面無懼怒之色與恆常一同並不改顏罽賓國王問獅子尊者曰在此做什麼尊者答曰在此蘊空王問得蘊空否尊者答曰已得蘊空法王曰求師頭得否尊者答曰身非我有何況頭乎又肇法師云四大元無我五蘊悉皆空將頭臨白刃猶如斬春風又舍利弗見天女問云何不變却女身去天女答曰我十二年覔女身了不可得教我變個什麼從上祖師皆得蘊空法又鏡清和尚住院三年本院土地要見師顏不能得又太古郝真人在趙州橋下辦道忽一夜聞衆鬼於河畔共語云明日有一戴鐵帽人替我言訖杳無音耗至次日將暮大雨忽作見一人頭頂一鐵鍋遮雨至橋下欲洗腳過橋太古一見喝云不可洗其人聽真人之言扶欄上橋而去至夜衆鬼皆至一鬼言我三年等得一箇替頭被這先生將我底來破了衆鬼欲害真人來往尋覔不得不知真人在於何處嗟嘆而去其時真人只在橋下鬼不能見又弘覺和尚住菴天厨送食及再參洞山和尚後皈菴天神三日送食到菴不見菴主菴主只在菴中為何不見皆得圓頓之法隱身之訣所以神鬼俱不得見且道四大不實色身非有五蘊盡空甚是本來面目咄這一句從那裏出來照見五蘊空底是阿誰瞎漢當面蹉過咦一心只在絲綸上不見蘆華對蓼紅見麼識破回頭便下功了然脫灑悟心空從他四大都零落其中別有一神通度一切苦厄若得五蘊空便出生死界得免輪回苦太上云吾有大患為吾有身及吾無身吾有何患釋云身是衆苦之本儒云有身有患無執無憂經云三界無安猶如火宅衆苦充滿甚可怖畏若是有智之人反照自己悟得自身皆虗幻非為真實何況他物一日無常盡皆拋撒百無一用念念如此心境自除雜念自少更須參訪知識親近智人求出身之路了生死大事忽朝𪹼地一聲脫下漆桶底便見本來面目要見本來面目麼古今無改變人自認不真若得心空苦便無有何生死有何拘一朝脫下胎用襖作箇逍遙大丈夫舍利子舍者屋舍也比四大五蘊色身利子者舍中之本來一點真靈即主張形骸者是也如客店主人暫住主若離舍屋即倒塌利子常在只是換了房舍居住道云身是氣之宅心是神之舍久而神氣散又是移屋住釋云無始劫來賃屋住至今誰識主人公藥山又云皮膚脫落盡惟有一真實要見真實底麼還識這箇也未來來往往畿千遭只是世人模不著莫道房兒又不多包藏天地及山河其中有箇真仙子不染纖塵鎮大羅色不異空道性無二色空一等只在目前應物現形人皆不識長者長空短者短空方者方空圓者圓空白者白空赤者赤空小者小空大者大空遠者遠空近者近空道云人人本有箇箇不無釋云蠢物含靈皆有佛性儒云一切含靈各具一太極古德又云塵塵是道塵塵是佛仙真云何物不稟道生何處不是道化隨處現形隨所自在道不遠人人自遠之反觀自身是色色中須有真空覺性應現種種相即是真空覺性所現永嘉云幻化空身即法身法身覺了無一物本源自性天真佛仙真云有形假相內包無相真形寶公云有相身中無相身咄理會得麼桃紅柳緑紅柳緑梅華白總是東君造化成虗空造化自然工大地山河體混融隨處現形人不識自家昧了主人公空不異色色空無一種世人自分別道云大方無隅混然一體釋云總三千界成一世界儒云登東山而小魯登泰山而小天下撒去蕃蘺何彼何此古云賢聖常行平等智不生分別相三教賢聖亦是空四生六道亦是空上至仙佛下至混蟲草木各各元本總是空且大朴未散陰陽未判二儀未分三才未立有甚作我元來皆一箇道理因大朴散天地合三才成立萬有滋生直至如今不能返本為何只因衆生執著不知元來是空迷己逐物心生倒見隨物流轉不能歸一機見不同著色著空隨色空二見若人於此廓然悟空平等身心內外無餘不見空色不被物使不被境瞞一槩平等有何一也便得歸一只這一也是多了重陽祖師云抱元守一是功夫地久天長一也無古德云萬法歸一一何歸一歸之處要君知且道一歸何處咦狗㖭熱油鐺理會麼人牛不見杳無踪盡道空來不是空一片白雲歸去也惟留明月照玄穹色即是空空在色中世人難見眼是色不能見物只是真空妙性能見耳是色不能聽聲只是真空妙性能聽鼻是色不能知香臭只是真空妙性能知舌是色不能言語只是真空妙性能言身是色不能覺觸只是真空妙性能覺觸腳是色不能行走只是真空妙性能行走手是色不能拈掇只是真空妙性能拈掇且去真空妙性無眼能見無耳能聞無鼻能嗅無舌能言無腳能行無手能拈意根有名無形分為八萬四千見聞知覺總歸六根遍身互用神通妙用古云通身是遍身是道云不須他處遠搜尋十二時中繞遍身色空不異妙理全彰色可色非真色空可空非真空總歸大空且道此理如何川老有云有相有求皆是妄無形無影墮偏枯堂堂密密何曾間一道寒光爍太虗道經云知空不空知色不色名為照了豫今不免饒舌說破若見一切有相境物休教染著若到情忘念絶之處休教迷真著相則著有迷真則落空若不著空不著有方是了事底人省麼休得瞌睡惺惺著萬竅都因一竅通一竅能納太虗空若還拿住玄中竅擺手皆歸大道中空即是色色在空外人被境瞞仙真云道無萬彚則不能顯萬彚無道則不能生釋云見色便見空無色空不見是以三教聖賢不見有色有空色空雙泯內外無分別如如常自然光明洞耀周遍沙界世人則不然也分內分外論彼論此著相分別見種種相隨聲逐色迷真不覺出殼入殼展轉不知改頭換面無有了期非干他事是自尋得底何不及早回頭自救且道怎生救得咄放下從前惡水瓶楝著痛處便金針一槩均平有甚差本來元是一人家只因著在枝稍上迷了從前太道芽受想行識因眼見故受色因受色心有思想因思想念行因念行有識解有六根因六根生六塵一識便有四大五蘊有此五蘊色身便明著相分別隨聲逐色憎愛憂恐從茲而起以致流浪生死而無停息若要生死斷輪回止但從起處一根照破令四大五蘊淨盡廓然無我當下空寂直下承當空劫已前自己寂而常照照而常寂太上云寂無所寂欲豈長生欲既不生即是真靜又云唯見於空觀空亦空空無所空所空既無無無亦無無無既無湛然常寂釋云人亦空法亦空二相本來同且道人法俱空必竟何處住諸境萬緣留不住混然隱在太虗空眼界牽連衆界忙不見可欲萬緣忘忘無可忘全身出便見靈山大法王亦復如是既無我則萬法皆無復歸於空便得返本還元也佛家喚作萬法歸一道家喚作復命歸根儒家喚作復遂元初天理到這裡言語道斷心行處滅若動念即乖張安排即不是所以川老云退後退後看看頑石動也理會得麼咄休得胡走動著三十棒一念才興相便成述真逐妄昧歸程若能放下空無物穩向如來藏裡行舍利子當面不識火不能燒水不能溺箭不能傷刀不能劈風不能飄日不能炙雨不能灑描畫不出毒藥不能害惡蟲不能螫只因行走路頭差所以失却波羅蜜見舍利子麼亘古到今不曾改變只是來往賃屋居住或時朱樓畫閣或時草舍茅堂或時金屏朱戶或時破廟窑龕省得麼川老云雲起南山雨北山馬名驢子幾多般請看浩渺無情水幾處隨方幾處圓若要不來不去須得諸漏已盡以歸寂滅如此者未出三界外天地不能拘作箇物外間人會麼向前不如退步紐揑不如自然自家房內主人公同居共住不知踪若能退步回頭望物物頭頭總得逢是諸法空相諸法皆空本非實際仙真云法本無法形本非形有形終是假無相是真人金剛經云法尚應捨何況非法又云一切有相皆是虗妄若見諸相非相即見如來從上諸師一味談空者只為衆生直下是空擔負不行起種種假名引導有情無情皆歸空寂得返本原若信未及但去靜坐反照照見五蘊實無所有自然忘形忘體得其人空既得人空如病安去藥其法亦空人法俱空自然休去歇去經云我身本不有憎愛何由生既得忘形忘體有甚念慮可牽到這地面自然放下無仙佛可做無生死可斷無修無證若更有絲毫可修可證則墮生死界永劫受沉淪若能徹底脫灑無所依倚不落有無二邊如虗空獨立直下承當空劫已前圓陀陀光爍爍底有何不可會麼乾坤兩朵海中蓮一切衆生虗出沒人法皆空心自休也無歡喜也無愁風平浪靜雲歸去月照寒江一色秋不生不滅有成有壞是事相不生不滅是理性此直言直說衆生具足法身真空妙性亘古今不曾生不曾滅不變不移無來無去無舊無新巍巍如是大上云寂兮寥兮獨立而不改周行而不殆又云寂然不動感而遂通四大五蘊任他虗生虗沒於自己法身總無交涉且道既無交涉如何步步不離古德云和光塵不染三界獨為尊川老又云得優游處且優游雲自高飛水自流只見黑風翻大浪未聞沉却釣魚舟如是者且道有交涉也無交涉若得五蘊皆空有甚離與不離理會得麼水流常不住青山鎮日間任他四大往來奔雲來雲去鎮常存竹影掃階塵不起月穿潭底水無痕不垢不淨亦說衆生本來清淨法身無名無相無痕無瑕無染無活不長不短不方不圓壞不得燒不得如虗空似蓮華不著水也不垢穢亦不淨潔常劫如然如水中月要見麼隨處放光幾人能得見清淨無瑕一法身如蓮出水不沾塵分身應現千江水千月還同一月真不增不減謂混沌虗空之體迢迢空劫之身如何增得如何減得也害不得也益不得道云在聖而不餘在凡而不缺釋云如如自然無缺無餘又云經歷劫而不壞至亘古而不遷古德云體似虗空沒崖崖上乘菩薩信無疑中下聞之必生怪且道因何如是呵呵自家繩子短倒怨井水深正是自家味了咄靈山會上曾相識今日因何不認人法身與色身不必論疏親皆賴東君力華柳一般春是故空中妙法真空不生不滅無垢無淨增不得減不得清淨本然古今不改萬劫常存刀割不斷箭射不穿繩繫不住火燒不燃雨灑不濕推擁不偏擊之不痛捉之難拈因何如是物不礙虗空虗空不礙物也仙真云真空不掛物大道不沾塵川老云虗空不閡絲毫念所以彰名大覺仙文始真經云天地雖大不能芽空中之核陰陽雖妙不能卵無雄之雌且道天地因何不能生發陰陽其生不能造化空中之物不能生芽者不沾地土不著境界也無雄之卵不能造化者內空無物也省得麼內外徹底空鬼神拿不著真空元不立纖塵才有微塵便不真泥水布衫都脫下分明便見裡頭人無色無受想行識既是空中有甚五蘊積習虗空之體安色不受色安聲不受聲安受不受受安想不受想安行不受行安識不受識六道四生一切假名假相都無納受清虗妙道纖塵不立必竟無形行如鳥道坐若太虗且道如何謂之鳥道太虗咦鳥道雖行而不見跡真空雖露而不見相會麼五蘊俱無便見空何須他覔主人公既得水清魚自見頭頭不昧有神通無眼耳鼻舌身意且道無眼耳鼻舌身意是箇甚麼休呆看蹉過了豫今明說有此六根是色身無此六識名法相如此之者只是數修行人眼雖看不要著在色上耳雖聽不要著在聲上鼻雖嗅不要著在香臭上舌雖嘗不要著在滋味上雖有身體休要著在相上須要忘形忘體意雖應事不要著在境物上要應應常靜道云眼不觀色耳不聽聲舌不耽味鼻不嗅香身不妄動意不狂亂儒云非禮勿視非禮勿聽非禮勿言非禮勿動便是無眼耳鼻舌身意也亦是六根清淨便是六塵不染又是六識皆空總而言之十八界靜也又名六耗消亡六賊死一真不動六門關總而言之十八獄空也斷也若此則天堂近也便見本來法身要見本來法身麼在眼曰見在耳曰聞在鼻曰臭在舌談論在手拈掇在足運奔全體起用全體法身非是六根四大五蘊見聞知覺切忌休認四大六根為己金剛經云凡所有相皆是虗妄道云悟者忘念歸真迷者著相失本盡是假名引導衆生不可知得便了須是親見法身若得親見轉凡成聖若聽人言說或文字上知解如畫餅充饑似說酒止渴終不濟事虗實云華藥欄莫顢頇星在稱弓不在盤重陽祖師云休教錯認定盤星且道此句如何說謂盤只可等物知輕別重者皆在星上祖師又恐人錯認定盤星討準定盤星是死物不知輕重是以休教錯認定盤星一般都是星有用得著底有用不著底此皆喻法精細審察休執著一邊且道此理如何真性與識性真神與識神一般同住止一假一成真牢著眼鷺鷀藏雪內飛起却才知六箇門頭一箇關五門不必更遮欄從他世事紛紛亂堂上家尊鎮日安無色聲香味觸法此乃六塵也皆從一根上起但去一根上反照從何而起若識起處從根本生起處是妄休教生苗仙真云揚湯點沸不如釜底抽薪釋云要伐其樹先去其根枝稍自墜既識根本棄假歸真識得我身非有我身尚無萬法皆空自然清靜觀身無身觀法亦然都歸空寂更去靜坐觀過去所作多種色聲香味觸法在於何處既無所有還如昨夢我心本空福罪無主何者是罪何者是福經云諦觀心罪本來空是則名為真懺悔且道懺箇甚麼悔箇甚麼懺則懺其前非悔則再不重犯咄既得諸根斷何處可生苗只有虗空在要見虗空麼看不見模不著對面如常光爍爍認得也未萬法皆空罪福無更須靜坐嘴羅都驀然拿住毗盧手做箇男兒大丈夫無眼界乃至無意識界若眼界淨竟識安十八界自然平安此十八界因執有眼界連纍十八界不安但去眼根反究虗假古德云眼是障道魔軍著境自迷回路仙真云眼觀心動著物迷真吾身非入六根皆歸敗壞靜審四大都無實義惟有真空妙性長劫不壞之體湛然常在亦無修證釋氏云那伽長在定無有不定之時先師云定中境界靜裡乾坤自然而然做作又不是也既得定力有甚散亂如同秋月圓陀陀光爍爍普天匝地無有不照著處說箇照著亦是自然非安想故拾得又云吾心不比月比月有圓缺一盞無油燈照得十方徹山河大地不能隔礙光明洞耀逈脫根塵體露真常太無染污但離諸緣便是仙佛理會麼光明無少缺只怕起雲遮遇境無心眼便明反觀自己見前程靈光射透長安道獨向蓬萊路上行無無明無無明者萬緣不生也無明是黑暗不停之念一切衆生盡有無明因有無明起多種差別百般煩惱皆是暗昧之心故令如是道云暗昧心不止地獄畜生本釋云無明不見菩提路不覺將身落火坑儒云寸心不昧萬法皆明又廣成子云木去火則不灰人去情則不死大顛云心處六情如鳥投網造罪惡業如蛾赴燈出殼入殼轉轉不覺流浪經劫皆因無明而起因有無明有行因行有識因識有名色因名色有六入因六入有觸因觸有受因受有愛因愛有取因取有有因有有生因生有老死憂悲苦惱皆因無明為始於此親見無明降伏令死死中更死欺人不得諸漏自盡煩惱永斷三毒自滅惡根自除須是直裁根源莫顧枝稍華葉根若截斷華葉自死掃除心地不見其身身盡無明盡塵垢亦盡萬劫塵沙數罪一時頓息輪回生死一時脫兔且道似個什麼嗄𧏙蜋離糞彈脫殼化金蟬會麼心間不昧性圓明遍界空空一坦平寸草不生塵土盡一輪日向海中生亦無無明盡既掃除心地十八界必然清淨身尚忘却更有甚無明盡迷則顛倒妄想是無明業心悟則轉凡成聖是圓明覺性都是一般心地只曾明與不明太上云同出而異名永嘉云無明實性即佛性幻化空身即法身若執幻身是我即有無明有無明即生三毒起三惡業三業昏暗六根內盲因此不見不知背覺合塵墮三惡道如有智慧之人能轉慳貪心為喜捨心轉瞋怒心為歡喜心轉愚癡執著心為圓融脫灑心更改六賊為神通於是一一轉得改得自然轉凡成聖凡夫即是聖人若轉不得改不得聖人即是凡夫如何凡人被物轉聖人能轉物百姓日用而不知終日忙忙被物所引日久月深離家漸遠不得還鄉迷真失本也若是會萬物歸於自己豈得迷失真本矣川老云終日忙忙那事無妨不求解脫不樂天堂但能一念歸無念高步毗盧頂上行又云終日吃飯不曾咬著一粒米終日著衣不曾掛著一縷絲道云居塵不染塵在欲而無欲身心一如內外無餘須是打成一片與空劫齊形影不存體露堂堂才有纖塵遍界空生便墮生死但去反觀己身我身不實餘者皆空我身尚假有甚無明且道如何迷失真道咦雪迷樵子路雲遮採藥人前途路徑黑漫漫無限江河萬嶺巑若解轉身些子力堂堂大道坦然寬乃至無老死既得無更有甚憂苦老死修行之人須要忘形忘體我身既無有何無明無明既無生死亦斷太上云內觀其心心無其心外觀其形形無其形遠觀其物物無其物三者既悟惟見於空金剛經云無我相無人相無衆生相無壽者相三者既無四相皆空有何無明老死萬法自空即是仙佛只這仙佛兩字也是多了亦乃強名且衆生顛倒被目前幻境所惑習性所牽形影變動不能作主隨物流轉因執有我妄心不滅人我不除執著聲色墮落生死若是見性之人目前無法亦無衆生心佛及衆生本無差別平等真法界一體同觀萬法歸一且道怎地同觀為仙真云雖則枝分稍異到了萬葉歸根然則派列流差必竟百川還海且太極未判混然一氣豈有二耶天地既分而有高下一生二二生三三生萬物皆一無所化天也是道地也是道人也是道有情無情皆受道氣所生觀梢末則萬彚不等知根本則一槩無殊釋云是法平等無有高下仙真云平等不二老是全真之丈夫若識破這個道理生則從他生老則從他老病則從他病死則從他死生老病死不曾礙著我漚生漚滅波翻浪瀼水本常然大顛云到家底人不見有生死亦無生滅天堂地獄六道四生一切幻化於徹底人總無交涉自然全身放下古云諸行無常一切空即是如來大圓覺且道死了向其處去會得麼一輪無影日端在太虗中既太執分身無明幻境盡觀空亦是空生死無由近亦無老死盡既無老死常劫如然豈有窮盡有盡者是幻境色身無老死者是真空法相既不著有亦不滯空活鱍鱍地轉轆轆地圓陀陀地光爍爍地豈有盡耶且初行行人先要打當乾淨方有些兒相應處太上云損之又損之以至於無為無為而無不為大顛云學道之人如剝芭蕉一般去一層又去一層直至去盡無下手處自然返本還源得五蘊空如未生相似燒了一般到空不空處脫體全忘不存踪跡要通身手眼不立纖塵名字猶不可得何況其他十二因緣六度萬行頭陀苦行一時頓脫如枯木死灰如百無一會底人古云不是息心除妄想都緣無事可思量若更說生說死說因說果說心說性永嘉云心是根法是塵兩種猶如鏡上痕垢盡除光始現心法雙忘方到無生死之地且道人法俱忘復是何物理會麼灰飛烟滅家何處水遠天長一色秋人法雙忘萬事休百川四海會源流猛然迸出寥天月照徹乾坤四大川無苦集滅道既忘其形即得生死斷更無窮盡有甚苦集滅滅道先師云因有身心招衆苦能忘心體苦何生釋云身是衆苦之本心是惡業之根若能放下身心便登菩提彼岸大顛云小乘之人日夜精進六度萬行心外求法免此四諦出三界免輪回無有是處諸佛為大事因緣出現於世不以小乘法濟度於衆生大乘之者學無為法端坐念實相衆罪如霜露慧日能消除存於間處收攝其心端坐不動觀一切法皆無所有及觀四大有身非覺體無相乃明真自知空寂頓觀淨盡無功之功長劫不壞無為之為而不為如如不動湛然常寂蓮經云諸法從本來常自寂滅相佛子行道已來世得作佛定慧力莊嚴無迷無悟無苦無樂無集無滅無道無得無慧無失本來無一物明鏡亦非臺到這裡修證即無染污不得一超直入如來地要見如來麼如來似來不來似去不去送之即不得留之亦不住會麼竹密不妨流水過山高豈礙白雲飛無苦集滅道幽哉頓然淨盡見如來愚人外覓三十二共汝同行你不猜無智亦無得自身尚假豈有得乎道云實無所得為化衆生名為得道釋云亦無人亦無佛大千沙界海中漚一切聖賢如電拂又云不是心不是佛不是物大顛云到這般田地如賊入空室無物得偷道經有云離種種邊名為妙道釋又云自性清淨實無一法可當情本來付有法付了然無法各各心自悟悟了無無法無得無失無進無修胸次才有絲毫有得有失我能我會我悟我達我聰明我智慧盡是增上慢人我不除皆墮生死若是真實道人總不如是自有出身之路且道如何是出身之路打教四邊淨自好向前行本來這箇沒纖塵只怕時人錯認真放下了然無一物何方不是武陵春以無所得故得無所得一體空虗修行人到這裡入大乘之位衆生因甚輪轉不能休息因不曾見性鮮於智慧不能廣悟無量空義執著自己胸次學解誤却本心大顛云從外入者不是家珍仙真云學他心內言終是別人語衆生被乾慧學解廣覽積習在心遂成我慢古云若有絲毫便是塵塵若不消只知傳說事塵若消盡諸境親見諸事親知如明眼人登高山無所見修行人須是究竟到空劫齊不落第二見歸根得旨方有相應若是執著人我便生輕易善星比丘講得維摩經增上慢人我不除生陷地獄雲光法師講得天華亂墜貪嗔不改墮落堰牛若要超佛越祖須是念念空寂世間幻化一切客塵惟太虗之體聲色不存纖塵不立如虗空相似便是了事清淨安樂道人要見清淨安樂道人麼不掛一縷絲頭頭自相遇赤膊條條不掛絲同行同坐阿誰知只認張三并李四不識你是甚家兒菩提薩埵菩提薩埵者西天梵語也東土翻為人空法空大顛有云了得人空名曰菩提了得法空名曰薩埵人法俱空名曰妙覺若四果小乘著相修行精進苦行及至修無漏斷塵沙惑果行圓滿得四果阿羅漢如獐獨跳神通狹劣墮在聲聞辟支佛果不能接物利生若不見性不得到圓頓之位須是見性若見性已反掌之間轉凡成聖自然機緣悟佛三昧知大道根源惟無師智自然智多種種方便度諸迷悟同登彼岸更不受生教外別傳不勞寸刃入圓頓無礙法門且道如何是無礙法門緬平一等七通八達衆水相合不分清衆火相聚一同明果必到家無異路坦然大道一般平依般若波羅蜜多故此中間六箇字依前涅槃解說修行得大智慧既有智慧必登彼岸而復太虗最尊最勝悟性般若天上天下無有及之道云一日有為不如一時無為又云一年學教不如一日修道古德云千日學慧不如一日學般若大顛云般若通透大光明藏如人入海轉入轉深開佛知見悟佛知見有大神通變化多般方便應現種種相隨機利物不落第二一體同觀平等真法界無衆生可度亦無佛可做理會得麼水流異派到海同源呵呵只怕漫散了收拾不來破鏡不重照落華難上枝了得般若波羅蜜調和種性皆歸一默然參透一何歸半夜虗空如白日心無罣礙依此般若波羅蜜多修行即得心無罣礙即悟真如妙理廓徹太虗清淨本然常得自在仙師云心若太虗不染一物釋云心同虗空法示等虗空法證得虗空時無是無非法既然與虗空混為一體有何差別是與不是外清淨內清淨內外清淨外空內空當體即空未有天地先有此空太上云有物混成先天地生又云無名天地之始有名萬物之母視之不見聽之不聞摶之不得迎之不見其首隨之不見其後五目不覩其蹤二聽絶聞其響川老云堂堂大道赫赫分明人人本具箇箇圓成只因差一念現出萬般形六祖云我有一物上拄天下拄地無人識得若親見一面超過佛祖出三界不墮輪回為人自肯自信自能保養得無礙法決定無礙理會麼扯破幔天網去了當頭召虗空難著物有甚罣與礙打破沐桶底便見觀自在無罣礙想念不斷謂之罣著境不回謂之礙重說無罣礙者內外清淨諸緣脫灑也如麗天杲日光滿大千無所不照一切虗妄境界總無罣礙東去無窮西去無極縱橫自在幻境不能所拘本源自性天真長劫不壞之體無去無來無變無異要見長劫不壞之體麼霧散暘初見塵盡鏡自明本來空沒礙著相自家迷若人回得轉仙佛一般齊故故之一字圓滿極則亦是真常之理不可言說因說不得故曰故金剛經云無法可說是名說法儒云道本無言言生理喪仙師云道難說須當自悟且道如何得悟咦一撞金鐘響驚醒夢中人真常圓滿極則故到處周圓難染活應變隨機有萬千坦蕩逍遙常獨步無有恐怖既心無罣礙真常自然圓滿更有甚麼恐怖之心若到此地悟得性空東西不辨南北不分不被明暗所瞞不被坊隅所當不被陰陽所拘不被造化所役似此有甚憂苦可怕有甚生死可怖不與萬法為伴當自獨行獨步上天仰之無窮入地去之無極山河石壁地水火風於此往來總無罣礙側掌行千里回程轉似飛天地莫能拘鬼神莫能測喚作自在大覺金仙要見自在金仙麼不須覓火把燈尋渴飲饑餐常對面去來自在任優游也無恐怖也無愁幻化境中留不住獨行獨步是瀛洲遠離顛倒夢想若罣礙無恐怖絶自然遠離顛倒夢想仙師云日間無想念夜後少夢寐釋云夢因想生想因念起世人只知合眼有夢不識開眼也有夢如何是開眼有夢先師有云假饒金銀過北斗大限來時一夢中豈不是開眼也做夢若要夢覺直待無常方省生前所作所為所愛所貪一切萬緣盡是一場春夢只是自己一身也顧官不得到此省時晚矣若是有智之人忽然自省自覺無常到來此貪欲愛樂盡是輪回之種地獄之因遠離顛倒悟本性空即知此自必無古云聖人無已無固無必無我無依無倚無晦無明無名無相無強無弱無穢無淨無止無作無任無滅無默無言絶思絶慮一切語言道斷心行處滅太上曰實無所得為化衆生釋云道妙幽微不可得見大顛云死了燒了無饑無渴無寒無熱無起無倒無坐無眠無六根無九竅無四百四病無八萬四千蟲永無顛倒夢想若不如是悟去清淨界中才一念閻浮早通八千年會得剎那間不會塵沙劫死死生生展轉不覺睡長夢而不醒萬劫顛倒而無止顛顛倒倒死了又生生了又死夢醒又夢睡覺又睡迷中更迷終無了期若有人打得徹透得過永免顛倒夢幻頓脫且道頓脫了向甚處去脫籠俊撲天飛一任諸人近不得日間無想夜無夢不被顛倒境物弄一拳打破上頭關翻身直上朝元洞究竟涅槃究者反自窮究己身盡是虗假一日無常盡皆敗壞難以留戀如是究竟則何矣本來無此四大因世人皆執有身迷己逐物棄親向疏認賊為子妄將四大六根為實作種種業受種種苦輪回萬劫不覺不知不能解脫默然自省於此日夜不離當念自覺自照細細參究此六根五蘊從塵劫已來本自無有名相皆不可得亦無成仙成佛亦無六道四生種種皆不可得老者盡也到這裡一槩平等盡底掀翻萬緣頓息餘外無餘川老云如斬一握絲一斬一齊斷又云一拳打破化城關一腳躍翻玄妙塞南北東西任往來休覓大悲觀自在大顛云離四句絶百非知見無見斯到涅槃且涅槃無生非死也乃是寂滅無生無死之謂也太上云湛然常寂佛經云生滅滅已寂滅為樂寂者寂然不動滅者諸法不生實無生死也且道無生無死底怎生模樣咄莫聽聲不是相識得虗空還一樣究竟自身元不有便須放下莫愚癡涅槃路上無朋伴大道無人我是誰三世諸佛大顛云過去莊嚴劫一千佛未來星宿劫一千佛現在賢劫一千佛三世三千佛更有窮劫佛不可說不可說數量不可盡此諸佛皆從修證所得川老云種瓜得瓜種果得果又云一佛二佛千萬佛各各眼橫兼鼻直昔年曾種善根來今日依前得渠力道經云種蘭得香種粟得糧為善降祥作惡降殃且三世諸佛不修不得成人身中亦有如此諸佛變化不一因習氣所昧境物所障自家迷了却不認得若於心無心便是過去佛寂然不動便是未來佛應物不昧隨機又便是現在佛清淨無染便是離垢佛出入無礙便是神通佛到處優游便是自在佛一心不昧便是光明佛道念堅固便是不壞佛各各諸佛自身俱有說亦不能盡變化多般惟一真耳但去靜坐觀過去現在未來皆同一體如虗空不異相不自相不他相非無相非取相不此岸不彼岸不中流觀其寂滅永不斷滅若人於此頓悟直下承當迢迢空劫盡在如今放光動地人法俱忘不見有過去未來現在究竟到盡無盡地即是空空我無我我我尚不可得空色亦無三世自空非識不滅識性自空前際後際中際亦空不落空見要見三世諸佛麼咄沿河休害渴把餅莫言饑過去未來并現在近在人身人自昧千變萬化少人知混合虗空成一塊依般若波羅蜜多故修行人須要智慧百種方便去無始劫來習性調和成一真之性而登彼岸若不見性卒難成就此句是三世諸佛之母十方諸佛依此修行果行圓滿成等正覺若離此句修行雖經多劫久守勤苦望成大道者鮮矣屬小乘法墮在聲聞緣覺辟支佛鬼仙人仙地仙有為之法終不成就一切聖果須當精進存有能所依般若波羅蜜多法得無上正真之道唯此一事若別修行過此法者無有是處此是教外別傳此法親見自性方乃傳授千聖不傳自悟自信不容授記圓頓之位獨孤標法參善知識求問至人憑師指示有緣契悟圓頓教沒人情若有私心傳授是外道法有分咐有傳授有得即有失有教有授盡是外道邪見生死根本仙師云法有三千六百門修行路徑此為真須知有箇玄微處不在三千六百門仙佛祖師自修自證本無語句亦無一法與人若有一法授記不名釋迦不喚道人道本無言只是教人自修自悟說著不真除非自見見無可見若被人教壞急須吐去大凡為人須從自己流出無價寶珠用之無盡上根之人一聞千悟具大總持中下之機多聞多不信太上云上士聞道勤而行之中士聞道若存若亡下士聞道大笑之此乃難信之法希有之事理會麼世人只知隨影轉不知離影到家鄉嗄脫落衣裳見本形寸絲不掛得安寧若人要趓渾身影便向無陰樹下行得阿耨多羅三藐三菩提此是西天梵語也阿言無耨多羅言上三藐言正三菩提言真東土翻為正真又云成等正覺此四箇字須是親見古云見道方修道不見復何修一大藏經說此四字不能盡諸佛亦說不盡三教聖賢皆修此四箇字盡歸聖道成等正覺今人若能依此般若波羅蜜多三藐三菩提法修行廓然頓悟親見無上正真自知當來仙佛直超聖果要見無上正真麼頭頭顯露物物周圓妙道虗空是祖宗分明應化不相同若人悟得真常道便識從前舊主公故知般若波羅蜜多因修行得見無上正真之道知般若波羅蜜多之神力也且過去諸佛慈悲憐憫衆生百種智慧方便之力隨之利物接引後來設像化人使泥塑木雕黃卷赤軸說因說果但以假名引導有情將善惡報應之事天堂地獄之說使人改惡向善離假歸真聲聞緣覺十聖三賢諸佛地位次第接引仙師云千里程途逐步而進釋云千仞寶臺非一圾而上忽然自悟自見本性超過諸佛位次一超直入如來地若不見性向外馳求終不成就悟有年月有日有時古云學道先須有悟由若無悟離文字外行住坐臥火急自救一同頓悟道云千日學道悟在一時只這一時便得輕快諸上善人同歸一處若是學解就古人唾津盡是外道邪見生死各路隨業受報不可共語豈不聞須菩提塵點劫前修行直至釋迦會下解空第一方等會中金剛請問四句偈廓然頓悟涕泪哭泣自歎云前所得慧眼未聞此經三世諸佛皆從此經流出如何是此經看時無一字當處放光明不憑智慧渡深河萬劫沉淪溺浪波既登彼岸歸真道何須更念薩婆訶是大神呪若會波羅蜜多便見是大神呪此神咒人人俱有不修不見亦是衆生心地法門有大神通道云心有主宰萬邪難侵儒云心正可以辟邪度人經云萬邪不干神明護門能驅邪立正變死人作活人改魔境為仙境頭頭示現物物全彰信手拈來百無妨礙此大神呪舉心動念鬼神滅爽返本還源外道魂驚精靈伏罔此蜜呪也識此呪麼神通并妙用何處不相隨有大威神力伏劍邪魔息何處不相隨同居人不識是大明呪既有大威神力一點靈光自然晃耀照徹十方射透三界山河大地無有隔礙過於日月無處不照呂祖云一點心燈焰焰生不勞挑剔朗然明得來照破人間暗獨放寒光滿太清雖然說破自不了不明要明麼拂却鏡上塵便見本來面燁燁光輝滿大千愚人不見被情牽若能放下渾無物依舊心天性月圓是無上呪得見自己光明照見從前黑暗無有能極者此神呪最上無過於此是為第一一切諸法皆不出於心呪是無上呪也道云心是衆之王釋云心是法中王所以無上也只一件王不動萬姓自安心不亂諸邪不起理會麼心呪最無上要去間思想人牛不見時便是靈山長是無等等呪此神呪無有等齊者不可說不可比無有邊際此呪世間少時說著難信須是親見此呪要見此呪麼放開包裹太虗空收來難立纖毫物本來無等件神性獨為尊乾坤難覆載萬古鎮常存能除一切苦若得見性有甚苦厄佛意慈悲愍衆生墮在世間流浪經劫受苦無窮不能返本是以應現種種相出現於世設種種方便救度群迷同出火院若有智慧之人諦聽大道之言只究心地莫去旁求初則打掃潔淨去纍劫之習性大顛云開池不待月池成月自來修行人先要心地清淨自然道生儒云以禮制心釋云在於間處收攝其心道云降心絶念三教聖人只教衆生心閒清虗心若無染自然見性若得見性永免輪回更不受得不死不生之道且從上諸佛諸聖久受勤苦方得見性心心念念處處逢源且道末後向甚麼處去不省處處迷歸路悟來時時在本鄉仙佛出世為何因皆因慈愍衆沉淪若人肯到船頭上免做拖泥帶水人真實不虗是真實法語非虗華之言一切諸佛說此神呪度脫有情不是異語不是謙言永嘉云證實相無人法剎那滅却阿毗業凡所有相皆是虗妄惟此無相之相是真實之相大千俱壞此相不壞因甚不壞道有云有形終是假無相是真人又云百骸俱消散一物鎮長靈道經云元始懸一寶珠在空玄之中佛經云我有無價寶珠繫在衣裡日夜推究忽然見牟尼寶珠又云牟尼珠人不識如來藏裡親收得然雖如是見道易守道難要見此珠麼圓陀陀光爍爍轉轆轆活鱍鱍常對曰不可棺音斡援之真實光明無價珠人人分上沒差殊只因些子誵訛處雲起青天月色無故說般若波羅蜜多呪因修行到此知般若神呪之功最大此句結前多種方便總歸為一具大總持同歸一心之法古云應觀法界性一切惟心造仙真云善惡存亡總在心大顛云迷者為含藏識死後作毒蛇悟者為祕蜜神呪得無生法如來有密語迦葉不隱藏語此神呪若人專心受持功行圓滿常持此咒鬼神遠離諸天寂聽常歡喜理會得麼非是口誦要心受持大開著眼休教走了要見此咒麼不在外不在內不在中間與內外且道在甚麼去處會會麼不離當處休教迷了性海寬洪怕起風風才起處浪翻空一朝風定波濤靜一輪月印水晶宮即說咒曰舉起四句偈擁護持經人不離左右順念逆念世間一切所求無不果遂十二時中不可忘却會麼休教錯認了萬聖千賢在己身休教昧了本來真因何苦勸重重舉一番提起一番新揭諦揭諦揭諦者人空又揭諦者法空人法俱空二空全忘也道云自心不動之後復有無極真機洞仙云人牛不見杳無踪月色光含萬象空且人空者只是教人忘形忘體法空者只是教人忘情絶念萬法俱捐善惡俱混不執己身不著於相忽然外不知有己身內不省有己心遠不知有諸物到這里脫體全忘自然見箇消息說箇消息又是執於事也大顛云不勞懸古鏡天曉自分明且道如何是天曉金雞三唱罷擁出一輪紅人法雙忘萬事休香爐無火冷颼颼一聲新雁遼天外遠水長天一色秋波羅揭諦波羅揭諦者到空無所空是也仙師云既無所空徹底淨虎眼禪師云不識亦空著所空若是既無所空得到彼岸若到彼岸其彼岸亦須離而再進則永不受生輪回斷生死息且道無生無死是箇甚麼認得麼休睡著咦他也轉你也轉對著面尋不見若要見待成片空無所空徹底除坦然歸去合清虗莫煉頑空休失本自然體道契真如波羅僧揭諦波羅僧揭諦者是諸佛清淨境界也五欲塵勞染污不得如仙佛慈愍衆生隨機應化救度群迷在異類中行龍蛇混雜凡聖同居逆行順行聖賢莫測如月在水應現千江如同一月其真月本在天端拿捉不得染污不得要拿捉得麼雖然親見應難捉除非身在太虗中清淨境界沒思量不染纖塵是道場試觀十五三更月影現千江百不妨菩提薩婆訶大顛云菩提是初薩婆訶是末且修行入起初先須發菩提心勇猛精進日夜為道古云道念若還比雜念成仙成佛已多時只是學人不肯驀直便行三心二意故不能到仙師云數他堠堠音後封堠五里一堠子却不行口念長安心不徹若是有志底人一刀兩段修道學佛更無退轉又守不怠忽然悟道達本性空即得菩提超出三界了無所了得無所得蕩然清淨則到極樂之所受用無盡故曰薩婆訶且道行到甚地面是徹頭處水窮山極處寸草不生時省麼先發菩提一片心次教萬慮不相侵直教鑽透虗空髓拔出從前治病針注經已畢更留一篇請晚學同志詳覽研窮二十年後有出身之路休要忘了老何到岸高師不在此限法本從心生還是從心滅生滅盡由誰請君自辨別既然皆己心何用他人說直須自下手扭出䥫牛血戎繩暮鼻穿攙定虗空結絟在無為柱不使他顛劣莫認賊為子心法都忘絶休教他瞞我一拳先打徹觀心亦無心觀法法亦輟人牛不見時碧天清皎潔秋月一般圓彼此難分別般若波羅蜜多心經終夫般若心經者諸佛肝心衆聖命脉也以故自唐以降釋家甚多比偶得無垢居士張九成之所注一本於書林禪教竝舉內外兼明真暗夜明燈霧海南針也仍加和點命工繡梓欲廣其傳豈非佛法良財色空之妙處哉時正保二己酉中冬日書於東山圓通峯之屮庵
